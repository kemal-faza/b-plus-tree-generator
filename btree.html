<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta
			name="author"
			content="Graham O'Neill, http://goneill.co.nz" />
		<title>B+ Tree demo</title>
		<script src="btree.js"></script>
		<script src="btree-show.js"></script>

		<style type="text/css">
			/* General CSS */

			HTML {
				overflow-y: scroll;
			}

			BODY {
				background-color: white;
				text-align: left;
				font-family: verdana, arial, sans-serif;
				font-size: 10pt;
			}

			* {
				margin: 0;
				padding: 0;
			}

			#content {
				background-color: white;
				padding: 10px 8px 15px 8px;
				position: relative;
			}

			h2 {
				font-family: verdana, arial, sans-serif;
				font-size: 10pt;
				font-weight: bold;
			}

			.formbox {
				padding: 15px 0px 15px 15px;
				border: 1px solid #003366;
			}

			.formline {
				padding: 5px 0px 5px 0px;
			}

			form label {
				float: left;
				padding: 4px 0px 0px 0px;
				width: 90px;
			}

			form input,
			textarea,
			select {
				padding: 3px 4px 3px 4px;
				border: 1px solid #c0c0c0;
				border-radius: 5px;
				font-family: arial, sans-serif;
				font-size: 10pt;
			}

			form input:focus,
			textarea:focus,
			select:focus {
				box-shadow: 0 0 5px #9ecccc;
			}

			.btn {
				color: #0000a0;
				background: #40c4c4;
				border-radius: 4px 4px 4px 4px;
				box-shadow: 1px 1px 2px;
				font-family: arial, sans-serif;
				font-size: 10pt;
				font-weight: bold;
				padding: 2px 3px 2px 3px;
				cursor: pointer;
			}
			.btn:hover {
				color: #001800;
				background: #40b040;
			}
			.btn:active {
				color: #180000;
				background: #c04040;
			}

			TABLE {
				border: 1px solid #c0c0c0;
				border-spacing: 0px;
				border-collapse: collapse;
				font-family: arial, sans-serif;
				font-size: 10pt;
			}

			/* This page CSS */

			#actForm {
				margin: 5px 10px 10px 10px;
			}

			.showBox {
				margin: 5px 0px 15px 0px;
				padding: 10px;
				color: #000000;
				background-color: #ffffff;
				border: 1px solid black;
				box-shadow: 6px 6px 6px #666;
				font-family: Arial;
				font-size: 10pt;
				overflow-x: auto;
			}

			CANVAS {
				display: block;
			}

			.trLvl {
				padding: 2px;
			}

			TABLE.trNode TD {
				border: 1px solid #8c6414;
				background-color: #d2b48c;
				padding: 2px 2px 2px 2px;
			}

			TABLE.trLeaf TD {
				border: 1px solid #008000;
				background-color: #90ee90;
				padding: 2px 2px 2px 2px;
			}

			TABLE.trLeaf TD.here {
				border: 1px solid #cc0000;
				background-color: #ffaaaa;
			}
		</style>

		<script>
			var myTree = null;
			var hist = [];
			var pool = [];
			var maxDisplay;
			var isBusy = false;
			var sourceFileHandle = null;
			var sourceFileName = '';
			var loadedFromFile = false;

			getTreePairs = function (tr) {
				var out = [];
				var lf = tr.root;
				while (!lf.isLeaf()) {
					lf = lf.nodptr[0];
				}
				while (lf !== null) {
					for (var i = 0, len = lf.keyval.length; i < len; i++) {
						out.push({ key: lf.keyval[i], recnum: lf.recnum[i] });
					}
					lf = lf.nextLf;
				}
				return out;
			};

			buildTreePayload = function (tr) {
				return {
					order: tr.maxkey + 1,
					pairs: getTreePairs(tr),
				};
			};

			downloadTreePayload = function (payload, fileName) {
				var blob = new Blob([JSON.stringify(payload, null, 2)], {
					type: 'application/json',
				});
				var url = URL.createObjectURL(blob);
				var a = document.createElement('a');
				a.href = url;
				a.download = fileName;
				document.body.appendChild(a);
				a.click();
				document.body.removeChild(a);
				URL.revokeObjectURL(url);
			};

			writePayloadToHandle = async function (payload, fileHandle) {
				var writable = await fileHandle.createWritable();
				await writable.write(JSON.stringify(payload, null, 2));
				await writable.close();
			};

			clearSourceFileInfo = function () {
				sourceFileHandle = null;
				sourceFileName = '';
				loadedFromFile = false;
			};

			confirmTreeReplace = function () {
				if (myTree === null) return true;
				return confirm('Replace current tree with selected file?');
			};

			saveTree = async function (forceSaveAs) {
				if (myTree === null) {
					ge$('toMsg').innerHTML =
						'Error: you have to build the tree first.';
					return;
				}

				var payload = buildTreePayload(myTree);
				var keyCount = commas(payload.pairs.length);

				if (!forceSaveAs && sourceFileHandle !== null) {
					try {
						await writePayloadToHandle(payload, sourceFileHandle);
						ge$('toMsg').innerHTML =
							'Tree saved to loaded file "' +
							sourceFileName +
							'" with ' +
							keyCount +
							' keys.';
					} catch (err) {
						ge$('toMsg').innerHTML =
							'Error saving file: ' + err.message;
					}
					ge$('act').focus();
					return;
				}

				var isSaveAs = forceSaveAs === true;
				var fileName = 'btree_' + new Date().getTime() + '.json';

				downloadTreePayload(payload, fileName);

				if (isSaveAs) {
					ge$('toMsg').innerHTML =
						'Tree saved as new file with ' + keyCount + ' keys.';
				} else if (loadedFromFile && sourceFileHandle === null) {
					ge$('toMsg').innerHTML =
						'Tree was loaded from a non-writable file source, so Save created a new file with ' +
						keyCount +
						' keys.';
				} else {
					ge$('toMsg').innerHTML =
						'Tree saved to new file with ' + keyCount + ' keys.';
				}

				ge$('act').focus();
			};

			startLoad = async function () {
				if (!confirmTreeReplace()) {
					ge$('act').focus();
					return;
				}

				if (typeof window.showOpenFilePicker !== 'function') {
					ge$('loadFile').click();
					ge$('act').focus();
					return;
				}

				try {
					var handles = await window.showOpenFilePicker({
						multiple: false,
						types: [
							{
								description: 'JSON files',
								accept: { 'application/json': ['.json'] },
							},
						],
					});
					if (!handles || handles.length === 0) {
						ge$('act').focus();
						return;
					}

					var fileHandle = handles[0];
					var file = await fileHandle.getFile();
					var data = JSON.parse(await file.text());
					loadTreeFromData(data);
					sourceFileHandle = fileHandle;
					sourceFileName = file.name;
					loadedFromFile = true;
				} catch (err) {
					if (err.name !== 'AbortError') {
						ge$('toMsg').innerHTML =
							'Error loading file: ' + err.message;
					}
				}

				ge$('act').focus();
			};

			loadTreeFromData = function (data) {
				if (typeof data !== 'object' || data === null) {
					throw new Error('Invalid JSON structure.');
				}
				if (typeof data.order !== 'number' || data.order < 3) {
					throw new Error('Invalid or missing "order" value.');
				}
				if (!Array.isArray(data.pairs)) {
					throw new Error('Invalid or missing "pairs" list.');
				}

				var loadedTree = new tree(data.order);
				var inserted = 0;
				for (var i = 0, len = data.pairs.length; i < len; i++) {
					var pair = data.pairs[i];
					if (
						typeof pair !== 'object' ||
						pair === null ||
						typeof pair.key === 'undefined'
					) {
						throw new Error('Invalid pair at index ' + i + '.');
					}
					if (loadedTree.insert(pair.key, pair.recnum)) inserted++;
				}

				myTree = loadedTree;
				maxDisplay = data.order * 50;
				hist = [];
				hist[0] = 'myTree = new tree(' + data.order + ');';
				hist.push('// ' + inserted + ' keys loaded from file');

				var txt =
					'Tree loaded from file. ' +
					commas(inserted) +
					' unique keys added.';
				if (inserted !== data.pairs.length) {
					txt +=
						' (' +
						commas(data.pairs.length - inserted) +
						' duplicate keys skipped.)';
				}
				ge$('toMsg').innerHTML =
					txt + '<br><br>\r\n' + myTree.show('toCanvas');
			};

			handleLoadFile = function (obj) {
				var file =
					obj && obj.files && obj.files.length > 0
						? obj.files[0]
						: null;
				if (file === null) return;

				if (!confirmTreeReplace()) {
					obj.value = '';
					return;
				}

				var reader = new FileReader();
				reader.onload = function (e) {
					try {
						var data = JSON.parse(e.target.result);
						loadTreeFromData(data);
						sourceFileHandle = null;
						sourceFileName = file.name;
						loadedFromFile = true;
					} catch (err) {
						ge$('toMsg').innerHTML =
							'Error loading file: ' + err.message;
					}
					obj.value = '';
					ge$('act').focus();
				};
				reader.readAsText(file);
			};

			modAct = function (act) {
				var txt,
					dis = false,
					num = '';
				switch (act) {
					case 'bld':
						txt = 'Order';
						break;
					case 'add':
					case 'del':
					case 'seek':
					case 'near':
						txt = 'Key value';
						break;
					case 'goto':
						txt = 'Key number';
						break;
					case 'top':
					case 'bot':
					case 'pack':
					case 'hist':
					case 'run':
					case 'hide':
					case 'show':
					case 'save':
					case 'load':
						txt = '';
						dis = true;
						break;
					case 'saveas':
						txt = '';
						dis = true;
						break;
					case 'rand':
						num = pool.length;
					case 'skip':
					case 'init':
					case 'time':
						txt = 'No of keys';
						break;
				}
				ge$('labl').innerHTML = txt;
				ge$('num').value = num;
				ge$('num').disabled = dis;
				if (dis) ge$('btn').focus();
				else endCursor(ge$('num'));
			};

			runAct = function (act, num) {
				if (isBusy) return;

				num = parseInt(num, 10);
				if (isNaN(num)) num = 0;

				if (act == 'hide') {
					ge$('frDiv').style.display = 'none';
					ge$('act').focus();
					return;
				}
				if (act == 'show') {
					ge$('frDiv').style.display = '';
					ge$('act').focus();
					return;
				}

				var txt = '';
				if (myTree !== null) txt = myTree.show('frCanvas');
				ge$('frMsg').innerHTML = txt;

				txt = '';
				if (
					'bld~init~hide~show~load'.search(act) == -1 &&
					myTree === null
				) {
					txt = 'Error: you have to build the tree first.';
				} else if (act == 'bld' && num < 3) {
					txt = 'Error: the tree must have Order of at least 3.';
				} else if (
					'add~seek~init~rand~time'.search(act) != -1 &&
					num <= 0
				) {
					txt =
						'Error: invalid number given. Must be greater than zero.';
				}
				if (txt.length > 0) act = 'error';

				var foc = 'act';
				switch (act) {
					case 'error':
						break;
					case 'bld':
						myTree = new tree(num);
						maxDisplay = num * 50;
						hist = [];
						hist[0] = 'myTree = new tree(' + num + ');';
						clearSourceFileInfo();
						break;
					case 'add':
						myTree.insert(num, num);
						hist.push('myTree.insert(' + num + ',' + num + ');');
						foc = 'num';
						ge$('num').value = '';
						break;
					case 'del':
						if (num == 0) {
							myTree.remove();
							hist.push('myTree.remove();');
						} else {
							myTree.remove(num);
							hist.push('myTree.remove(' + num + ');');
						}
						foc = 'num';
						ge$('num').value = '';
						break;
					case 'seek':
						myTree.seek(num);
						hist.push('myTree.seek(' + num + ');');
						foc = 'num';
						break;
					case 'near':
						myTree.seek(num, true);
						hist.push('myTree.seek(' + num + ',true);');
						foc = 'num';
						break;
					case 'goto':
						myTree.goto(num);
						hist.push('myTree.goto(' + num + ');');
						break;
					case 'top':
						myTree.goTop();
						hist.push('myTree.goTop();');
						break;
					case 'bot':
						myTree.goBottom();
						hist.push('myTree.goBottom();');
						break;
					case 'pack':
						myTree.pack();
						hist.push('myTree.pack();');
						break;
					case 'skip':
						if (num == 0 || num == 1) {
							myTree.skip();
							hist.push('myTree.skip();');
						} else {
							myTree.skip(num);
							hist.push('myTree.skip(' + num + ');');
						}
						foc = 'btn';
						break;
					case 'init':
						pool = [];
						for (i = 0; i < num; i++) {
							pool[i] = i + 1;
						}
						pool.shuffle();
						txt =
							'Pool set up with ' +
							commas(num) +
							' keys.<br>\r\n';
						break;
					case 'rand':
						var i = 0;
						while (i < num && pool.length > 0) {
							myTree.insert(pool.pop(), '');
							if (!myTree.found) i++;
						}
						if (i < num)
							txt =
								'Error: ran out of unique keys in the pool. Only ' +
								commas(i) +
								' added.';
						hist.push('// ' + i + ' random keys added to tree');
						break;
					case 'time':
						var ord = myTree.maxkey + 1;
						myTree = null;
						pool = [];
						for (i = 0; i < num; i++) {
							pool[i] = i + 1;
						}
						pool.shuffle();
						if (num <= 2000000) {
							var start = new Date().getTime();
							myTree = new tree(ord);
							for (var i = num; i > 0; i--) {
								myTree.insert(pool.pop(), '');
							}
							var end = new Date().getTime();
							txt =
								'Tree rebuilt and ' +
								commas(myTree.length) +
								' random keys added in ' +
								commas(end - start) +
								'ms<br><br>\r\n';
							start = new Date().getTime();
							for (var i = num; i > 0; i--) {
								myTree.seek(i, false);
								// if (myTree.keyval != i) {
								//	alert('Key '+i+' missing!');
								//	break;
								// }
							}
							end = new Date().getTime();
							txt +=
								'Seek for every key completed in ' +
								commas(end - start) +
								'ms\r\n';
						} else {
							isBusy = true;
							var start = new Date().getTime();
							myTree = new tree(ord);
							addLots(start, num, num);
							txt = 'Working... Please wait';
						}
						hist = [];
						hist[0] = 'myTree = new tree(' + ord + ');';
						hist.push('// ' + num + ' random keys added to tree');
						clearSourceFileInfo();
						break;
					case 'run':
						Hardcoded();
						hist.push('// Hardcoded script run');
						break;
					case 'save':
						saveTree(false);
						return;
					case 'saveas':
						saveTree(true);
						return;
					case 'load':
						startLoad();
						return;
					case 'hist':
						for (var i = 0, len = hist.length; i < len; i++) {
							txt += hist[i] + '<br>\r\n';
						}
				}

				if (myTree !== null) {
					if (txt.length == 0) txt = myTree.show('toCanvas');
					else myTree.showoff('toCanvas');
				}
				ge$('toMsg').innerHTML = txt;
				if (foc != 'num') ge$(foc).focus();
				else endCursor(ge$('num'));
			};

			Hardcoded = function () {
				myTree.insert(1, '');
				myTree.insert(15, '');
				myTree.insert(4, '');
				myTree.insert(10, '');
				myTree.insert(16, '');
				myTree.insert(11, '');
				myTree.insert(13, '');
				myTree.insert(12, '');
				myTree.insert(20, '');
				myTree.insert(9, '');
				myTree.insert(25, '');
			};

			function addLots(strTim, totnum, remain) {
				var doNow = Math.min(remain, 1000000);
				for (var i = doNow; i > 0; i--) {
					myTree.insert(pool.pop(), '');
				}
				remain = remain - doNow;
				if (remain > 0) {
					setTimeout(function () {
						addLots(strTim, totnum, remain);
					}, 0);
				} else {
					var endTim = new Date().getTime();
					txt =
						'Tree rebuilt and ' +
						commas(myTree.length) +
						' random keys added in ' +
						commas(endTim - strTim) +
						'ms<br><br>\r\n';
					strTim = new Date().getTime();
					for (var i = totnum; i > 0; i--) {
						myTree.seek(i, false);
					}
					endTim = new Date().getTime();
					txt +=
						'Seek for every key completed in ' +
						commas(endTim - strTim) +
						'ms\r\n';
					ge$('toMsg').innerHTML = txt;
					isBusy = false;
				}
			}

			Array.prototype.shuffle = function () {
				for (var i = this.length - 1; i > 0; i--) {
					var j = Math.floor(Math.random() * (i + 1));
					var tmp = this[i];
					this[i] = this[j];
					this[j] = tmp;
				}
				return this;
			};

			/* General JS */

			commas = function (x) {
				return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
			};

			enterToTab = function (obj, e) {
				var e = typeof event != 'undefined' ? window.event : e; // IE : Mozilla
				if (e.keyCode == 13) {
					var q;
					var ele = document.forms[0].elements;
					for (var i = 0, len = ele.length; i < len; i++) {
						q = i == ele.length - 1 ? 0 : i + 1;
						if (obj == ele[i]) {
							ele[q].focus();
							break;
						}
					}
					return false;
				}
			};

			function ge$(d) {
				var x = document.getElementById(d);
				if (!x) {
					var y = document.getElementsByName(d);
					if (y.length > 0) x = y[0];
				}
				return x;
			}

			function endCursor(el) {
				el.focus();
				if (el.setSelectionRange) {
					var endPos = el.value.length;
					el.setSelectionRange(endPos, endPos);
				}
			}

			function debug(txt) {
				window.console && console.log(txt);
			}
		</script>
	</head>

	<body onload="document.actForm.num.focus()">
		<div id="content">
			<h2>Action</h2>
			<form
				name="actForm"
				id="actForm">
				<div class="formbox">
					<div class="formline">
						<label for="act">Selection</label
						><select
							name="act"
							id="act"
							width="150"
							style="width: 150px"
							onchange="modAct(this.value)">
							<option value="bld">Build new tree</option>
							<option value="add">Insert</option>
							<option value="del">Delete</option>
							<option value="seek">Seek</option>
							<option value="near">Seek near</option>
							<option value="skip">Skip</option>
							<option value="goto">Go to</option>
							<option value="top">Go top</option>
							<option value="bot">Go bottom</option>
							<option value="pack">Pack</option>
							<option
								value=" "
								disabled>
								―――――――――
							</option>
							<option value="hide">Hide From box</option>
							<option value="show">Show From box</option>
							<option value="hist">Show history</option>
							<option
								value=" "
								disabled>
								―――――――――
							</option>
							<option value="save">Save tree to file</option>
							<option value="saveas">
								Save tree as new file
							</option>
							<option value="load">Load tree from file</option>
							<option
								value=" "
								disabled>
								―――――――――
							</option>
							<option value="run">Run script</option>
							<option
								value=" "
								disabled>
								―――――――――
							</option>
							<option value="init">Init random pool</option>
							<option value="rand">Add random keys</option>
							<option value="time">Random key timer</option>
						</select>
					</div>
					<div class="formline">
						<label
							id="labl"
							for="num"
							>Order</label
						><input
							name="num"
							id="num"
							size="5"
							maxlength="8"
							onkeypress="return enterToTab(this, event);"
							type="text" />
					</div>
					<div class="formline">
						<label>&nbsp;</label
						><input
							id="btn"
							class="btn"
							value="Go"
							onclick="
								runAct(
									document.actForm.act.value,
									document.actForm.num.value,
								)
							"
							type="button" />
					</div>
					<input
						id="loadFile"
						type="file"
						accept="application/json,.json"
						style="display: none"
						onchange="handleLoadFile(this)" />
				</div>
			</form>

			<div id="frDiv">
				<h2>From</h2>
				<div class="showBox">
					<div id="frMsg"></div>
					<canvas
						id="frCanvas"
						width="1"
						height="1"></canvas>
				</div>
			</div>

			<h2>Result</h2>
			<div class="showBox">
